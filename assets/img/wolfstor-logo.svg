<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Fondo circular degradado azul -->
  <defs>
    <radialGradient id="wolfGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#wolfGrad)"/>

  <!-- Cabeza de lobo minimalista -->
  <g transform="translate(100,95)">
    <!-- Orejas -->
    <polygon points="-28,-38 -18,-50 -8,-35" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
    <polygon points="8,-35 18,-50 28,-38" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
    <!-- Orejas internas -->
    <polygon points="-22,-38 -18,-46 -14,-37" fill="#334155"/>
    <polygon points="14,-37 18,-46 22,-38" fill="#334155"/>

    <!-- Cara -->
    <path d="M-30,-25 Q-35,-5 -32,10 Q-28,25 -20,30 Q-12,35 0,38 Q12,35 20,30 Q28,25 32,10 Q35,-5 30,-25 Q15,-30 0,-32 Q-15,-30 -30,-25 Z"
          fill="#1e293b"/>

    <!-- Ojos (brillantes) -->
    <ellipse cx="-11" cy="-8" rx="5" ry="4" fill="#fbbf24"/>
    <ellipse cx="11" cy="-8" rx="5" ry="4" fill="#fbbf24"/>
    <ellipse cx="-10" cy="-9" rx="2.5" ry="3" fill="#1e293b"/>
    <ellipse cx="12" cy="-9" rx="2.5" ry="3" fill="#1e293b"/>

    <!-- Hocico -->
    <ellipse cx="0" cy="8" rx="8" ry="5" fill="#334155"/>
    <ellipse cx="-3" cy="6" rx="1.5" ry="1" fill="#1e293b" opacity="0.4"/>
    <ellipse cx="3" cy="6" rx="1.5" ry="1" fill="#1e293b" opacity="0.4"/>

    <!-- Nariz -->
    <ellipse cx="0" cy="4" rx="4" ry="3" fill="#0f172a"/>
  </g>
</svg>
