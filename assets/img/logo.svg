<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Fondo circular degradado dorado -->
  <defs>
    <radialGradient id="queenGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#queenGrad)"/>

  <!-- Corona minimalista -->
  <g transform="translate(100,92)">
    <!-- Base de la corona -->
    <path d="M-35,10 L-35,0 Q-35,-15 -25,-20 L-15,-10 L0,-28 L15,-10 L25,-20 Q35,-15 35,0 L35,10 Z"
          fill="#1f2937" stroke="#1f2937" stroke-width="1" stroke-linejoin="round"/>
    <!-- Línea decorativa horizontal -->
    <rect x="-30" y="2" width="60" height="4" rx="2" fill="#f59e0b"/>
    <!-- Brillos -->
    <circle cx="-18" cy="-8" r="2" fill="#ffd54f" opacity="0.8"/>
    <circle cx="0" cy="-20" r="2.5" fill="#ffd54f" opacity="0.8"/>
    <circle cx="18" cy="-8" r="2" fill="#ffd54f" opacity="0.8"/>
    <!-- Letra Q sutil -->
    <text x="0" y="30" text-anchor="middle" fill="#1f2937" font-size="24" font-family="Georgia, serif" font-weight="bold" opacity="0.5">Q</text>
  </g>
</svg>
